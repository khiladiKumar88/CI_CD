# Automatically analyzes failed GitHub Actions workflows using GitHub Models (free).
# Triggers whenever any other workflow in this repo fails.
# No extra API key needed — uses your existing GITHUB_TOKEN.

name: "Failure Analyzer"

on:
  workflow_run:
    workflows: ["*"]
    types: [completed]

jobs:
  analyze:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      models: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Analyze failure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
          LLM_PROVIDER: "github_models"
        run: python analyze_failure.py
